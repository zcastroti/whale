<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
    </main>

    <script type="module">
        import { db, doc, getDoc, setDoc, collection, getDocs, updateDoc, deleteDoc, query, orderBy } from './script.js'
        // --------------------------------------------------------------------------

        import { modal } from './script.js'

        const CONTEUDO = document.querySelector('.conteudo')
        const USUARIO = 'admin'

        carregar_Notas()
        async function carregar_Notas() {
            let menuNotas = document.createElement('div')
            menuNotas.classList.add('menuNotas')
            CONTEUDO.prepend(menuNotas);

            let notasREF = collection(db, 'usuarios', USUARIO, 'notas')
            let consulta = await getDocs(notasREF);
            if (!consulta.empty) {
                consulta.forEach(e => {
                    let dados = e.data()
                    let nota = document.createElement('div')
                    nota.classList.add('nota')
                    menuNotas.appendChild(nota)
                    nota.dataset.id = e.id
                    nota.innerHTML = `${dados.nome}`
                });
            } else { menuNotas.innerHTML = 'Nenhuma nota cadastrada' }
            editar_Nota()
        }

function editar_Nota() {
    let notas = document.querySelectorAll('.nota')
    notas.forEach(e => {
        e.onclick = async ()=> { 
            let id = e.dataset.id

            let notaREF = doc(db, 'usuarios', USUARIO, 'notas', id)
            let consulta = await getDoc(notaREF)
            let dados = consulta.data() 

            modal('Editar Nota')

            // Corpo Modal
            document.querySelector('.mBody').innerHTML =
            `
            <div class='editor' contenteditable="true">${dados.conteudo || ''}</div>
            `


        

            
            //-- Salvar
            document.querySelector('.salvar').onclick = ()=> { 
                salvarNota() 
            }

            //-- Deletar Nota
            document.querySelector('.deletar').onclick = ()=> {
                modal_Editor.style.display = 'none'
                let modal_Deletar_Nota = document.createElement('div')
                modal_Deletar_Nota.classList.add('modal' , 'flutuante')
                document.body.appendChild(modal_Deletar_Nota)
                modal_Deletar_Nota.innerHTML = `
                    <div class="modal_cabecalho">
                        <i class="fa-solid fa-shapes"></i>
                        <p>Deletar Nota</p>
                    </div>

                    <div class="modal_conteudo">
                        <p>Deseja realmente deletar essa nota?</p>
                    </div>

                    <div class="modal_rodape">
                        <button class='BTN cancelar_deletar'><i class="fa-solid fa-circle-xmark"></i> Cancelar</button>
                        <button class='BTN confirmar_deletar'><i class="fa-solid fa-circle-check"></i> Confirmar</button>
                    </div>
                `
                
                document.querySelector('.cancelar_deletar').onclick = ()=> { 
                    modal_Deletar_Nota.remove()
                    modal_Editor.style.display = 'flex'
                }
                document.querySelector('.confirmar_deletar').onclick = async ()=> {
                    await deleteDoc(notaREF);
                    modal_Deletar_Nota.remove()
                    modal_Editor.remove()
                    overlay.remove()
                    e.remove()
                }
            }     
        }
    });
}

    </script>

    <script type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/ac3bdc8044.js" crossorigin="anonymous"></script>
</body>
</html>
