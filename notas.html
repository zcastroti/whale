<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
    </main>

    <script type="module">
        import { db, doc, getDoc, setDoc, collection, getDocs, updateDoc, deleteDoc, query, orderBy } from './script.js'
        // --------------------------------------------------------------------------

        import { modal } from './script.js'

        const CONTEUDO = document.querySelector('.conteudo')
        const USUARIO = 'admin'

        carregar_Notas()
        async function carregar_Notas() {
            let menuNotas = document.createElement('div')
            menuNotas.classList.add('menuNotas')
            CONTEUDO.prepend(menuNotas);

            let notasREF = collection(db, 'usuarios', USUARIO, 'notas')
            let consulta = await getDocs(notasREF);
            if (!consulta.empty) {
                consulta.forEach(e => {
                    let dados = e.data()
                    let nota = document.createElement('div')
                    nota.classList.add('nota')
                    menuNotas.appendChild(nota)
                    nota.dataset.id = e.id
                    nota.innerHTML = `${dados.nome}`
                });
            } else { menuNotas.innerHTML = 'Nenhuma nota cadastrada' }
            editar_Nota()
        }

function editar_Nota() {
    let notas = document.querySelectorAll('.nota')
    notas.forEach(e => {
        e.onclick = async ()=> { 
            let id = e.dataset.id

            let notaREF = doc(db, 'usuarios', USUARIO, 'notas', id)
            let consulta = await getDoc(notaREF)
            let dados = consulta.data() 

            modal(dados.nome)

            // Body Modal
            document.querySelector('.mBody').innerHTML =
            `
            <div class='editor' contenteditable="true">${dados.conteudo || ''}</div>
            `

            // Footer Modal
            document.querySelector('.mFooter').innerHTML =
            `
            <button class="salvar">Salvar</button>
            <button class="deletar">Deletar</button>
            `

        

            //-- Salvar
            document.querySelector('.salvar').onclick = ()=> { 
                salvarNota() 
            }
    
        }
    });
}

    </script>

    <script type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/ac3bdc8044.js" crossorigin="anonymous"></script>
</body>
</html>
