<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale</title>    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
    </main>

    <script type="module">
        import { db, doc, getDoc, setDoc, collection, getDocs, updateDoc, deleteDoc, query, orderBy } from './script.js'
        import { modal, confirm, gerarID } from './script.js'
        const CONTEUDO = document.querySelector('.conteudo')
        const USUARIO = localStorage.getItem('usuario')
        // --------------------------------------------------------------------------

        carregar_Notas()
        async function carregar_Notas() {
            CONTEUDO.innerHTML = ''
            let menuNotas = document.createElement('div')
            menuNotas.classList.add('menuNotas')
            CONTEUDO.prepend(menuNotas);

            let notasREF = collection(db, 'usuarios', USUARIO, 'notas')
            let consulta = await getDocs(notasREF);
            if (!consulta.empty) {
                consulta.forEach(e => {
                    let dados = e.data()
                    let nota = document.createElement('div')
                    nota.classList.add('nota')
                    menuNotas.appendChild(nota)
                    nota.dataset.id = e.id
                    nota.innerHTML = `${dados.nome}`
                });
            } else { menuNotas.innerHTML = 'Nenhuma nota cadastrada' }
            add_Nota()
            abrir_Nota()
        }

        function abrir_Nota() {
            let notas = document.querySelectorAll('.nota')
            notas.forEach(e => {
                e.onclick = async () => { 
                    let id = e.dataset.id
                    let notaREF = doc(db, 'usuarios', USUARIO, 'notas', id)
                    let consulta = await getDoc(notaREF)
                    let dados = consulta.data() 

                    modal(dados.nome)

                    // Body Modal
                    document.querySelector('.mBody').innerHTML =
                    `
                    <div class='editor' contenteditable="true">${dados.conteudo || ''}</div>
                    `

                    // Footer Modal
                    document.querySelector('.mFooter').innerHTML =
                    `
                    <button class='renomear'>Renomear <i class="fa-regular fa-pen-to-square"></i></button>
                    <button class='deletar'>Deletar <i class="fa-regular fa-trash-can"></i></button>
                    `

                    // --- IMPLEMENTAÇÃO DO SALVAMENTO AUTOMÁTICO ---
                    const editor = document.querySelector('.editor')
                    let temporizador

                    editor.oninput = () => {
                        clearTimeout(temporizador)

                        temporizador = setTimeout(async () => {
                            const novoConteudo = editor.innerHTML

                            await updateDoc(notaREF, {
                                conteudo: novoConteudo
                            })
                            console.log("Nota salva automaticamente!")
                            
                        }, 1000)
                    }

                    //-- Renomear Nota
                    document.querySelector('.renomear').onclick = ()=> {
                        confirm('Renomear Nota: ' + `<b>${dados.nome}</b>`)

                        document.querySelector('.cBody').innerHTML +=
                        `
                        <input type="text" maxlength="20" class='novoNome' value='${dados.nome}'>
                        `

                        document.querySelector('.confirmar').onclick = async ()=> {
                            let novoNome = document.querySelector('.novoNome').value
                            if (!novoNome) return
                            await updateDoc(notaREF, {
                                nome: novoNome
                            })

                            carregar_Notas()
                            document.querySelector('.confirm').remove()
                            document.querySelector('.overlayConfirm').remove()
                            document.querySelector('.modal').remove()
                            document.querySelector('.overlay').remove()
                       }
                    }

                    //-- Deletar Nota
                    document.querySelector('.deletar').onclick = ()=> {
                       confirm('Deletar Nota: ' + `<b>${dados.nome}</b>`)

                       document.querySelector('.confirmar').onclick = async ()=> {
                            deleteDoc(notaREF)
                            carregar_Notas()
                            document.querySelector('.confirm').remove()
                            document.querySelector('.overlayConfirm').remove()
                            document.querySelector('.modal').remove()
                            document.querySelector('.overlay').remove()
                       }
                    }
                }
            });
        }

        function add_Nota() {
            let addNota = document.createElement('button')
            addNota.classList.add('add')
            CONTEUDO.appendChild(addNota)
            addNota.innerHTML = `Adicionar Nota <i class="fa-solid fa-circle-plus"></i>`
            document.querySelector('.add').onclick = ()=> {
                confirm('Nome da Anotação')

                document.querySelector('.cBody').innerHTML +=
                `
                <input type="text" maxlength="20" class='nome'>
                `
                document.querySelector('.confirmar').onclick = async ()=> {
                    let nome = document.querySelector('.nome').value
                    if (!nome) return

                    let id = gerarID();
                    let notaREF = doc(db, 'usuarios', USUARIO, 'notas', id);

                    await setDoc(notaREF, { nome: nome })
                    carregar_Notas()

                    document.querySelector('.confirm').remove()
                    document.querySelector('.overlayConfirm').remove()
                }
            }
        }
    </script>

    <script type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/ac3bdc8044.js" crossorigin="anonymous"></script>
</body>
</html>
