<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale</title>    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
        <input type="text" class="login" placeholder="Login">
        <input type="text" class="senha" placeholder="Senha">
        <button class="acessar">Acessar <i class="fa-solid fa-fingerprint"></i></button>
    </main>

    <script type="module">
        import { db, doc, getDoc, setDoc, collection, getDocs, updateDoc, deleteDoc, query, orderBy } from './script.js'
        import { modal, confirm, gerarID } from './script.js'
        const CONTEUDO = document.querySelector('.conteudo')

        // --------------------------------------------------------------------------

        document.querySelector('.acessar').onclick = async ()=> {
            let login = document.querySelector('.login').value.toLowerCase()
            let senha = document.querySelector('.senha').value.toLowerCase()
            if (!login || !senha) return
            
            let usuarios = collection(db, 'usuarios')
            let consulta = await getDocs(usuarios);
            consulta.forEach(e => {
                let dados = e.data()       

                if (login != dados.login) return
                if (senha != dados.senha) return

                console.log('Autenticado')

                localStorage.setItem('usuario', login);
                window.location.href = 'notas.html';
            })
        }
    </script>

    <script type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/ac3bdc8044.js" crossorigin="anonymous"></script>
</body>
</html>
